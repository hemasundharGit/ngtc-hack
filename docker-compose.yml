version: "3.9"

services:
  backend:
    build:
      context: ./mcrd
      dockerfile: Dockerfile
    container_name: medigenie-backend
    env_file:
      - ./mcrd/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    container_name: medigenie-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
